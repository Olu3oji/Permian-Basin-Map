<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Permian Basin Well Map</title>
  <link rel="stylesheet" href="https://js.arcgis.com/4.29/esri/themes/light/main.css">
  <script src="https://js.arcgis.com/4.29/"></script>
  <style>
    html, body, #viewDiv {
      height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;
    }
    #title-bar {
      position: absolute;
      top: 15px;
      left: 50%;
      transform: translateX(-50%);
      background: white;
      padding: 10px 20px;
      border-radius: 8px;
      font-family: Arial, sans-serif;
      font-size: 16px;
      font-weight: bold;
      z-index: 99;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }
    #filter-bar {
      position: absolute;
      top: 70px;
      left: 50%;
      transform: translateX(-50%);
      background: white;
      padding: 8px 16px;
      border-radius: 8px;
      z-index: 99;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
      display: flex;
      gap: 8px;
      align-items: center;
      font-family: Arial, sans-serif;
      font-size: 13px;
    }
    #filter-bar select {
      padding: 4px 8px;
      border-radius: 4px;
      border: 1px solid #ccc;
      font-size: 13px;
    }
    #filter-bar button {
      padding: 4px 12px;
      border-radius: 4px;
      border: none;
      background: #0079c1;
      color: white;
      cursor: pointer;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div id="viewDiv"></div>
  <div id="title-bar">Permian Basin — Oil & Gas Wells</div>
  <div id="filter-bar">
    <label>Filter by Source:</label>
    <select id="source-filter">
      <option value="">All Sources</option>
      <option value="Natural Gas">Natural Gas</option>
      <option value="Solar">Solar</option>
      <option value="Wind">Wind</option>
      <option value="Petroleum">Petroleum</option>
      <option value="Coal">Coal</option>
      <option value="Nuclear">Nuclear</option>
      <option value="Hydroelectric">Hydroelectric</option>
    </select>
    <button onclick="applyFilter()">Apply</button>
    <button onclick="clearFilter()">Clear</button>
  </div>

  <script>
    var powerLayer;

    require([
      "esri/config",
      "esri/Map",
      "esri/views/MapView",
      "esri/layers/FeatureLayer",
      "esri/widgets/Legend",
      "esri/widgets/ScaleBar",
      "esri/widgets/Search",
      "esri/widgets/LayerList"
    ], function(esriConfig, Map, MapView, FeatureLayer, Legend, ScaleBar, Search, LayerList) {

      esriConfig.apiKey = "AAPTahjHwZLTQC9JrYbWN9dJ7AA..YhMOy6Bnm7sbD-kvEtUgyI5lONmqhcjvTKt2TuXHRg4juReGzEMB0ogCCwE0djgrlLGdXZvykYr7etIQfxccLtv3SrI7MLDld9uSE0kdcnU-tUwITPRZ8loQiFLwpzMJfWaZ0OmKUhpQvSEWiXqRfpbxlJtLes_djmA3LVHelOXKSZCo_wST1hFVomvSVeFeokQya6RrjFt0UvvajeYlIZKkTczym96am3XrBq6G4189cf_1fzfeALJu2vSf0XAeF54MAT1_xfZhIi0X";

      const map = new Map({
        basemap: "dark-gray-vector"
      });

      const view = new MapView({
        container: "viewDiv",
        map: map,
        center: [-102.5, 31.9],
        zoom: 7
      });

      powerLayer = new FeatureLayer({
        url: "https://services2.arcgis.com/FiaPA4ga0iQKduv3/arcgis/rest/services/Power_Plants_in_the_US/FeatureServer",
        title: "US Power Plants",
        outFields: ["*"],
        labelsVisible: false,
        renderer: {
          type: "simple",
          symbol: {
            type: "simple-marker",
            color: [255, 165, 0, 0.8],
            outline: { color: [255, 255, 255, 0.5], width: 0.5 },
            size: 6
          }
        },
        popupTemplate: {
          title: "Plant: {Plant_Name}",
          content: [{
            type: "fields",
            fieldInfos: [
              { fieldName: "Plant_Name", label: "Plant Name" },
              { fieldName: "Total_MW", label: "Total Power (MW)" },
              { fieldName: "STATE", label: "State" },
              { fieldName: "PrimSource", label: "Primary Source" }
            ]
          }]
        }
      });

      const myWellLayer = new FeatureLayer({
        url: "https://services5.arcgis.com/NgxpA9QzvaRJP3Py/arcgis/rest/services/crescent_demo_wells_dewitt_howard/FeatureServer/0",
        title: "Crescent Demo Wells",
        outFields: ["*"],
        labelsVisible: false,
        renderer: {
          type: "simple",
          symbol: {
            type: "simple-marker",
            color: [0, 200, 150, 0.9],
            outline: { color: [255, 255, 255, 0.6], width: 0.8 },
            size: 8
          }
        },
        popupTemplate: {
          title: "Well: {name}",
          content: "Type: {type} <br> Operator: {operator} <br> Status: {status}"
        }
      });

      map.add(powerLayer);
      map.add(myWellLayer);

      const search = new Search({
        view: view,
        sources: [{
          layer: powerLayer,
          searchFields: ["Plant_Name", "STATE"],
          displayField: "Plant_Name",
          exactMatch: false,
          outFields: ["*"],
          name: "Power Plants",
          placeholder: "Search power plants..."
        }]
      });
      view.ui.add(search, "top-right");

      const layerList = new LayerList({ view: view });
      view.ui.add(layerList, "top-left");

      const legend = new Legend({ view: view });
      view.ui.add(legend, "bottom-left");

      const scaleBar = new ScaleBar({ view: view, unit: "imperial" });
      view.ui.add(scaleBar, "bottom-right");

    });

    function applyFilter() {
      var selected = document.getElementById("source-filter").value;
      if (powerLayer && selected) {
        powerLayer.definitionExpression = "PrimSource = '" + selected + "'";
      }
    }

    function clearFilter() {
      if (powerLayer) {
        powerLayer.definitionExpression = "";
        document.getElementById("source-filter").value = "";
      }
    }
  </script>
</body>
</html>
